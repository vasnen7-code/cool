{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور - W Game{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-logo">W<span>Game</span></h1>
    <h2>إعادة تعيين كلمة المرور</h2>

    <a class="btn-telegram" href="{{ telegram_links.otp_bot }}" target="_blank" rel="noopener">
      🤖 افتح بوت OTP لاستلام رمز التحقق
    </a>

    <form method="POST" action="{{ url_for('auth.reset_password_request') }}" class="auth-form" id="reset-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" name="username" value="{{ username or '' }}" required>

      <label for="otp_code">رمز التحقق (OTP)</label>
      <div class="otp-row">
        <input type="text" id="otp_code" name="otp_code" required pattern="\d{5}" maxlength="5" inputmode="numeric" placeholder="5 أرقام">
        <button type="button" id="send-otp-btn" class="btn-secondary" data-purpose="reset">إرسال الرمز</button>
      </div>
      <small id="otp-status" class="otp-status"></small>

      <label for="password">كلمة المرور الجديدة</label>
      <input type="password" id="password" name="password" required minlength="6">

      <label for="password_confirm">تأكيد كلمة المرور</label>
      <input type="password" id="password_confirm" name="password_confirm" required minlength="6">

      <button type="submit" class="btn-primary">حفظ كلمة المرور</button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('auth.login') }}">العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
{% endblock %}
